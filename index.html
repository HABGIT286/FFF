<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 تشخيص قاعدة البيانات - ONX-TAQE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#0f1e3d;color:#fff;min-height:100vh;padding:20px}
.container{max-width:800px;margin:0 auto}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;margin-bottom:20px}
h1{font-size:1.8rem;margin-bottom:8px;background:linear-gradient(135deg,#00d4ff,#7b2fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status{display:flex;align-items:center;gap:8px;margin:12px 0;padding:12px;border-radius:12px;background:rgba(255,255,255,0.05)}
.status.success{border:1px solid #00ff88}
.status.error{border:1px solid #ff6b6b}
.status.pending{border:1px solid #ffd700}
.icon{font-size:1.5rem}
pre{background:rgba(0,0,0,0.3);padding:16px;border-radius:12px;overflow-x:auto;font-size:0.85rem;max-height:400px;overflow-y:auto}
.btn{padding:12px 24px;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:700;font-size:1rem;margin:8px 0}
.btn-primary{background:linear-gradient(135deg,#00d4ff,#7b2fff);color:#fff}
.btn-success{background:linear-gradient(135deg,#00c851,#00ff88);color:#000}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.log{font-size:0.85rem;color:rgba(255,255,255,0.6);margin-top:12px}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>📊 تشخيص قاعدة البيانات</h1>
    <p style="color:rgba(255,255,255,0.6)">سيقوم هذا الكود بجمع معلومات الجداول والأعمدة وإرسالها عبر Telegram</p>
    
    <div id="status" class="status pending">
      <span class="icon">⏳</span>
      <span>جاهز للتشغيل...</span>
    </div>
    
    <button class="btn btn-primary" id="startBtn" onclick="startDiagnosis()">🚀 بدء التشخيص والإرسال</button>
    
    <div class="log" id="log"></div>
  </div>
  
  <div class="card" id="resultCard" style="display:none">
    <h2>📋 النتيجة</h2>
    <pre id="result"></pre>
    <button class="btn btn-success" onclick="copyResult()">📋 نسخ النتيجة</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
// ⚙️ إعدادات Supabase
const SUPABASE_URL = "https://mcwemgjmqwbgxoyiwant.supabase.co";
const SUPABASE_KEY = "sb_publishable_qmIUC4Rkb-VGOek8qkVqFg_Sn4x3WjI";

// ⚙️ إعدادات Telegram
const TG_BOT_TOKEN = "7735965641:AAFzkUy27zKXYWroodhdxOBapMgwttyq5_s";
const TG_CHAT_ID = "910624538";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = (s) => document.querySelector(s);
const log = (msg) => { $('#log').innerHTML += `<div>• ${msg}</div>`; };
const setStatus = (status, icon, text) => {
  const el = $('#status');
  el.className = `status ${status}`;
  el.innerHTML = `<span class="icon">${icon}</span><span>${text}</span>`;
};

window.startDiagnosis = async function() {
  $('#startBtn').disabled = true;
  $('#log').innerHTML = '';
  $('#resultCard').style.display = 'none';
  
  try {
    setStatus('pending', '⏳', 'جاري جمع المعلومات...');
    log('بدء التشخيص...');
    
    // جمع معلومات الجداول
    const tables = await getTables();
    log(`✅ تم العثور على ${tables.length} جدول`);
    
    // جمع معلومات الأعمدة لكل جدول
    const schema = [];
    for(const table of tables) {
      log(`📊 فحص جدول: ${table}...`);
      const columns = await getColumns(table);
      const rowCount = await getRowCount(table);
      const rls = await getRLSStatus(table);
      
      schema.push({
        table,
        columns,
        rowCount,
        rls
      });
    }
    
    // تنسيق الرسالة
    const message = formatMessage(schema);    
    // عرض النتيجة
    $('#result').textContent = message;
    $('#resultCard').style.display = 'block';
    
    // الإرسال عبر Telegram
    setStatus('pending', '📤', 'جاري الإرسال عبر Telegram...');
    log('جاري الإرسال عبر Telegram...');
    
    await sendToTelegram(message);
    
    setStatus('success', '✅', 'تم الإرسال بنجاح!');
    log('✅ تم إرسال التشخيص إلى Telegram');
    
  } catch(err) {
    console.error(err);
    setStatus('error', '❌', 'حدث خطأ: ' + err.message);
    log('❌ خطأ: ' + err.message);
  }
  
  $('#startBtn').disabled = false;
};

async function getTables() {
  const { data, error } = await supabase.rpc('get_tables');
  if(error) {
    // طريقة بديلة
    const { data: alt } = await supabase
      .from('information_schema.tables')
      .select('table_name')
      .eq('table_schema', 'public')
      .eq('table_type', 'BASE TABLE');
    return alt?.map(t => t.table_name) || [];
  }
  return data || [];
}

async function getColumns(tableName) {
  const { data, error } = await supabase
    .from('information_schema.columns')
    .select('column_name, data_type, is_nullable, column_default, character_maximum_length')
    .eq('table_name', tableName)
    .eq('table_schema', 'public')
    .order('ordinal_position');
  
  if(error) throw error;
  return data || [];
}

async function getRowCount(tableName) {  try {
    const { count, error } = await supabase.from(tableName).select('*', { count: 'exact', head: true });
    if(error) return '?';
    return count || 0;
  } catch {
    return '?';
  }
}

async function getRLSStatus(tableName) {
  try {
    const { data, error } = await supabase
      .from('pg_tables')
      .select('rowsecurity')
      .eq('tablename', tableName)
      .eq('schemaname', 'public')
      .single();
    
    if(error) return 'غير معروف';
    return data?.rowsecurity ? 'مفعّل' : 'معطل';
  } catch {
    return 'غير معروف';
  }
}

function formatMessage(schema) {
  let msg = `📊 *تقرير تشخيص قاعدة البيانات*\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += `🕐 الوقت: ${new Date().toLocaleString('ar-EG')}\n`;
  msg += `📋 عدد الجداول: ${schema.length}\n\n`;
  
  for(const s of schema) {
    msg += `━━━━━━━━━━━━━━━━━━━━\n`;
    msg += `📁 *جدول: ${s.table}*\n`;
    msg += `📊 عدد السجلات: ${s.rowCount}\n`;
    msg += `🔐 حالة RLS: ${s.rls}\n`;
    msg += `📝 الأعمدة (${s.columns.length}):\n`;
    
    for(const col of s.columns) {
      msg += `  • \`${col.column_name}\` - ${col.data_type}`;
      if(col.is_nullable === 'YES') msg += ` (NULL)`;
      if(col.column_default) msg += ` = ${col.column_default}`;
      msg += `\n`;
    }
    msg += `\n`;
  }
  
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += `✅ نهاية التقرير`;
    return msg;
}

async function sendToTelegram(message) {
  const url = `https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`;
  
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: TG_CHAT_ID,
      text: message,
      parse_mode: 'Markdown'
    })
  });
  
  const result = await response.json();
  
  if(!result.ok) {
    throw new Error('Telegram Error: ' + (result.description || 'Unknown error'));
  }
  
  return result;
}

window.copyResult = function() {
  const text = $('#result').textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert('✅ تم نسخ النتيجة!');
  });
};
</script>
</body>
</html>
