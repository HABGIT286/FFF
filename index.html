<!DOCTYPE html>
<html>
<head><title>إنشاء صورة اختبارية</title></head>
<body>
    <h1>إنشاء صورة اختبارية مع GPS</h1>
    <button onclick="getLocation()">📍 الحصول على موقعي وإنشاء صورة</button>
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="testImage" style="max-width: 100%; display: none;">
    
    <script>
        function getLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                // إنشاء canvas
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 800;
                canvas.height = 600;
                
                // رسم خلفية
                ctx.fillStyle = '#00ff41';
                ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#000';
                ctx.font = '30px monospace';
                ctx.fillText('Test Image with GPS', 50, 100);
                ctx.fillText('LAT: ' + lat, 50, 150);
                ctx.fillText('LNG: ' + lng, 50, 200);
                
                // حفظ الصورة
                const dataURL = canvas.toDataURL('image/jpeg', 1.0);
                const img = document.getElementById('testImage');
                img.src = dataURL;
                img.style.display = 'block';
                
                // تنزيل الصورة
                const link = document.createElement('a');
                link.download = 'test-gps-image.jpg';
                link.href = dataURL;
                link.click();
                
                alert('تم إنشاء الصورة! إحداثيات GPS:\nLAT: ' + lat + '\nLNG: ' + lng);
            });
        }
    </script>
</body>
</html>
