<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxtarGet - Particle Text System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
            color: white;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .input-container {
            pointer-events: auto;            position: relative;
            width: 90%;
            max-width: 600px;
        }
        
        .search-input {
            width: 100%;
            padding: 20px 40px;
            background: rgba(0, 20, 40, 0.6);
            border: 2px solid rgba(0, 255, 170, 0.3);
            border-radius: 50px;
            color: #00ffaa;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.2),
                        inset 0 0 20px rgba(0, 255, 170, 0.1);
        }
        
        .search-input:focus {
            border-color: rgba(0, 255, 170, 0.8);
            box-shadow: 0 0 50px rgba(0, 255, 170, 0.4),
                        inset 0 0 30px rgba(0, 255, 170, 0.2);
            transform: scale(1.02);
        }
        
        .search-input::placeholder {
            color: rgba(0, 255, 170, 0.4);
        }
        
        .submit-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            padding: 12px 30px;
            background: linear-gradient(135deg, #00ffaa, #00cc88);
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 170, 0.4);
        }
                .submit-btn:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 170, 0.6);
        }
        
        .loading-orb {
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 170, 0.8) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            filter: blur(20px);
        }
        
        .loading-orb.active {
            animation: orbPulse 2s ease-in-out infinite;
        }
        
        @keyframes orbPulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
            50% { transform: translateX(-50%) scale(1.2); opacity: 0.8; }
        }
        
        .title-text {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 72px;
            font-weight: 900;
            color: #00ffaa;
            text-shadow: 0 0 40px rgba(0, 255, 170, 0.8);
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 8px;
        }
        
        .title-text.visible {
            animation: titleAppear 1s ease-out forwards;
        }
        
        @keyframes titleAppear {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }            100% { opacity: 1; transform: translateX(-50%) scale(1); }
        }
        
        .particle-info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 20, 40, 0.7);
            padding: 15px 30px;
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 170, 0.3);
            backdrop-filter: blur(10px);
            font-size: 14px;
            color: rgba(0, 255, 170, 0.8);
            z-index: 20;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            padding: 10px 20px;
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid rgba(0, 255, 170, 0.4);
            border-radius: 8px;
            color: #00ffaa;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 600;
        }
        
        .control-btn:hover {
            background: rgba(0, 255, 170, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 170, 0.4);
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 20, 40, 0.7);            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 170, 0.3);
            font-size: 12px;
            color: rgba(0, 255, 170, 0.8);
            z-index: 20;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div class="controls">
        <button class="control-btn" onclick="particleSystem.randomizeColors()">🎨 ألوان عشوائية</button>
        <button class="control-btn" onclick="particleSystem.explode()">💥 انفجار</button>
        <button class="control-btn" onclick="particleSystem.reset()">🔄 إعادة تعيين</button>
        <button class="control-btn" onclick="toggleRotation()">🔄 دوران</button>
    </div>
    
    <div class="stats">
        <div>الجسيمات: <span id="particle-count">0</span></div>
        <div>FPS: <span id="fps-counter">60</span></div>
    </div>
    
    <div id="ui-layer">
        <div class="loading-orb" id="loadingOrb"></div>
        <div class="title-text" id="titleText">AxtarGet</div>
        
        <div class="input-container">
            <input type="text" 
                   class="search-input" 
                   id="textInput" 
                   placeholder="اكتب النص هنا..." 
                   maxlength="20"
                   autocomplete="off">
            <button class="submit-btn" onclick="particleSystem.generateText()">تحويل</button>
        </div>
    </div>
    
    <div class="particle-info">
        نظام الجسيمات المتحولة | اسحب بالماوس للتدوير | عجلة الماوس للتكبير
    </div>

    <script>
        class AxtarGetParticleSystem {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = new THREE.Scene();                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.particleSystem = null;
                this.particleCount = 8000;
                this.positions = null;
                this.targetPositions = null;
                this.originalPositions = null;
                this.colors = null;
                this.currentText = '';
                this.isAnimating = false;
                this.autoRotate = true;
                this.rotationSpeed = 0.002;
                
                this.init();
                this.createParticles();
                this.setupEvents();
                this.animate();
                
                // Update stats
                document.getElementById('particle-count').textContent = this.particleCount;
            }
            
            init() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);
                
                this.camera.position.z = 50;
                this.camera.position.y = 10;
                this.camera.lookAt(0, 0, 0);
                
                // Add ambient light
                const ambientLight = new THREE.AmbientLight(0x404040, 2);
                this.scene.add(ambientLight);
                
                // Add point lights
                const light1 = new THREE.PointLight(0x00ffaa, 2, 100);
                light1.position.set(10, 10, 10);
                this.scene.add(light1);
                
                const light2 = new THREE.PointLight(0x00ccff, 2, 100);
                light2.position.set(-10, -10, 10);
                this.scene.add(light2);
            }
            
            createParticles() {
                const geometry = new THREE.BufferGeometry();
                this.positions = new Float32Array(this.particleCount * 3);
                this.originalPositions = new Float32Array(this.particleCount * 3);
                this.colors = new Float32Array(this.particleCount * 3);                
                // Create sphere distribution
                for (let i = 0; i < this.particleCount; i++) {
                    const i3 = i * 3;
                    
                    // Spherical distribution
                    const radius = 20 + Math.random() * 5;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    
                    this.positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                    this.positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                    this.positions[i3 + 2] = radius * Math.cos(phi);
                    
                    this.originalPositions[i3] = this.positions[i3];
                    this.originalPositions[i3 + 1] = this.positions[i3 + 1];
                    this.originalPositions[i3 + 2] = this.positions[i3 + 2];
                    
                    // Green/cyan colors
                    const colorChoice = Math.random();
                    if (colorChoice > 0.7) {
                        // Yellow-green accent
                        this.colors[i3] = 0.8 + Math.random() * 0.2;
                        this.colors[i3 + 1] = 1;
                        this.colors[i3 + 2] = 0.2 + Math.random() * 0.3;
                    } else {
                        // Cyan-green main
                        this.colors[i3] = 0 + Math.random() * 0.2;
                        this.colors[i3 + 1] = 0.8 + Math.random() * 0.2;
                        this.colors[i3 + 2] = 0.6 + Math.random() * 0.4;
                    }
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));
                
                // Create particle material
                const sprite = this.createParticleSprite();
                const material = new THREE.PointsMaterial({
                    size: 0.8,
                    map: sprite,
                    vertexColors: true,
                    blending: THREE.AdditiveBlending,
                    depthTest: false,
                    transparent: true,
                    opacity: 0.8
                });
                
                this.particleSystem = new THREE.Points(geometry, material);
                this.scene.add(this.particleSystem);            }
            
            createParticleSprite() {
                const canvas = document.createElement('canvas');
                canvas.width = 64;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');
                
                const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                gradient.addColorStop(0.3, 'rgba(0, 255, 170, 0.8)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 64, 64);
                
                const texture = new THREE.CanvasTexture(canvas);
                return texture;
            }
            
            async generateText() {
                const input = document.getElementById('textInput');
                const text = input.value.trim();
                
                if (!text) {
                    this.showNotification('الرجاء إدخال نص', 'error');
                    return;
                }
                
                this.currentText = text;
                document.getElementById('titleText').textContent = text;
                document.getElementById('titleText').classList.add('visible');
                document.getElementById('loadingOrb').classList.add('active');
                
                // Generate text positions
                const textPositions = await this.getTextPositions(text);
                
                // Animate particles to text shape
                this.morphToText(textPositions);
                
                setTimeout(() => {
                    document.getElementById('loadingOrb').classList.remove('active');
                }, 2000);
            }
            
            getTextPositions(text) {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 800;                    canvas.height = 400;
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 120px Inter';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text, 400, 200);
                    
                    const imageData = ctx.getImageData(0, 0, 800, 400);
                    const data = imageData.data;
                    const positions = [];
                    
                    // Sample pixels
                    const step = 6;
                    for (let y = 0; y < 400; y += step) {
                        for (let x = 0; x < 800; x += step) {
                            const index = (y * 800 + x) * 4;
                            if (data[index + 3] > 128) {
                                positions.push({
                                    x: (x - 400) * 0.15,
                                    y: -(y - 200) * 0.15,
                                    z: (Math.random() - 0.5) * 5
                                });
                            }
                        }
                    }
                    
                    // If not enough positions, fill randomly
                    while (positions.length < this.particleCount) {
                        positions.push({
                            x: (Math.random() - 0.5) * 100,
                            y: (Math.random() - 0.5) * 50,
                            z: (Math.random() - 0.5) * 20
                        });
                    }
                    
                    resolve(positions.slice(0, this.particleCount));
                });
            }
            
            morphToText(textPositions) {
                if (!this.particleSystem) return;
                
                const positions = this.particleSystem.geometry.attributes.position.array;
                this.targetPositions = textPositions;
                
                // Animate each particle
                for (let i = 0; i < this.particleCount; i++) {
                    const i3 = i * 3;
                    const target = textPositions[i];                    
                    if (target) {
                        gsap.to(positions, {
                            duration: 2,
                            ease: "power3.inOut",
                            [i3]: target.x,
                            [i3 + 1]: target.y,
                            [i3 + 2]: target.z,
                            delay: i * 0.0005
                        });
                    }
                }
                
                this.particleSystem.geometry.attributes.position.needsUpdate = true;
                this.isAnimating = true;
                
                setTimeout(() => {
                    this.isAnimating = false;
                }, 3000);
            }
            
            explode() {
                if (!this.particleSystem) return;
                
                const positions = this.particleSystem.geometry.attributes.position.array;
                
                for (let i = 0; i < this.particleCount; i++) {
                    const i3 = i * 3;
                    const direction = new THREE.Vector3(
                        positions[i3],
                        positions[i3 + 1],
                        positions[i3 + 2]
                    ).normalize();
                    
                    gsap.to(positions, {
                        duration: 1.5,
                        ease: "power2.out",
                        [i3]: positions[i3] + direction.x * 50,
                        [i3 + 1]: positions[i3 + 1] + direction.y * 50,
                        [i3 + 2]: positions[i3 + 2] + direction.z * 50,
                        yoyo: true,
                        repeat: 1,
                        delay: i * 0.0001
                    });
                }
                
                this.particleSystem.geometry.attributes.position.needsUpdate = true;
            }
            
            reset() {                if (!this.particleSystem) return;
                
                const positions = this.particleSystem.geometry.attributes.position.array;
                
                for (let i = 0; i < this.particleCount; i++) {
                    const i3 = i * 3;
                    gsap.to(positions, {
                        duration: 2,
                        ease: "power3.inOut",
                        [i3]: this.originalPositions[i3],
                        [i3 + 1]: this.originalPositions[i3 + 1],
                        [i3 + 2]: this.originalPositions[i3 + 2],
                        delay: i * 0.0003
                    });
                }
                
                this.particleSystem.geometry.attributes.position.needsUpdate = true;
                document.getElementById('titleText').classList.remove('visible');
                document.getElementById('textInput').value = '';
                this.currentText = '';
            }
            
            randomizeColors() {
                if (!this.particleSystem) return;
                
                const colors = this.particleSystem.geometry.attributes.color.array;
                const hue = Math.random();
                
                for (let i = 0; i < this.particleCount; i++) {
                    const i3 = i * 3;
                    const color = new THREE.Color();
                    color.setHSL(hue + Math.random() * 0.2, 0.8, 0.6);
                    
                    colors[i3] = color.r;
                    colors[i3 + 1] = color.g;
                    colors[i3 + 2] = color.b;
                }
                
                this.particleSystem.geometry.attributes.color.needsUpdate = true;
            }
            
            setupEvents() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
                
                // Mouse interaction
                let isDragging = false;                let previousMousePosition = { x: 0, y: 0 };
                
                document.addEventListener('mousedown', () => isDragging = true);
                document.addEventListener('mouseup', () => isDragging = false);
                document.addEventListener('mousemove', (e) => {
                    if (isDragging && this.particleSystem) {
                        const deltaMove = {
                            x: e.offsetX - previousMousePosition.x,
                            y: e.offsetY - previousMousePosition.y
                        };
                        
                        this.particleSystem.rotation.y += deltaMove.x * 0.005;
                        this.particleSystem.rotation.x += deltaMove.y * 0.005;
                        this.autoRotate = false;
                    }
                    previousMousePosition = { x: e.offsetX, y: e.offsetY };
                });
                
                document.addEventListener('wheel', (e) => {
                    this.camera.position.z += e.deltaY * 0.05;
                    this.camera.position.z = Math.max(20, Math.min(200, this.camera.position.z));
                });
                
                // Enter key to generate
                document.getElementById('textInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.generateText();
                });
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                
                if (this.autoRotate && this.particleSystem && !this.isAnimating) {
                    this.particleSystem.rotation.y += this.rotationSpeed;
                }
                
                // Add subtle floating animation
                if (this.particleSystem) {
                    this.particleSystem.position.y = Math.sin(Date.now() * 0.0005) * 2;
                }
                
                this.renderer.render(this.scene, this.camera);
            }
            
            showNotification(message, type = 'info') {
                const notif = document.createElement('div');
                notif.style.cssText = `
                    position: fixed;
                    top: 100px;
                    left: 50%;                    transform: translateX(-50%);
                    background: ${type === 'error' ? 'rgba(255, 0, 0, 0.8)' : 'rgba(0, 255, 170, 0.8)'};
                    color: white;
                    padding: 15px 30px;
                    border-radius: 10px;
                    z-index: 100;
                    animation: slideDown 0.3s ease;
                `;
                notif.textContent = message;
                document.body.appendChild(notif);
                
                setTimeout(() => {
                    notif.remove();
                }, 3000);
            }
        }
        
        let particleSystem;
        let rotationInterval;
        
        function init() {
            particleSystem = new AxtarGetParticleSystem();
            
            // Generate default text after 2 seconds
            setTimeout(() => {
                document.getElementById('textInput').value = 'AxtarGet';
                particleSystem.generateText();
            }, 2000);
        }
        
        function toggleRotation() {
            particleSystem.autoRotate = !particleSystem.autoRotate;
        }
        
        // FPS Counter
        let lastTime = performance.now();
        let frames = 0;
        function updateFPS() {
            const currentTime = performance.now();
            frames++;
            
            if (currentTime >= lastTime + 1000) {
                document.getElementById('fps-counter').textContent = frames;
                frames = 0;
                lastTime = currentTime;
            }
            
            requestAnimationFrame(updateFPS);
        }
                // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            init();
            updateFPS();
        });
    </script>
</body>
</html>
