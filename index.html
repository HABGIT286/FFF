<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 FORENSIC IMAGE ANALYZER - مصحح</title>
    <!-- تحميل مكتبة EXIF من مصدر موثوق -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Share Tech Mono', monospace; }
        
        :root {
            --primary: #00ff41; --secondary: #008f11; --dark: #003b00;
            --black: #000000; --alert: #ff0040; --warning: #ffaa00;
            --info: #00ffff;
        }
        
        body {
            background: var(--black); color: var(--primary); min-height: 100vh;
            padding: 20px; overflow-x: hidden;
        }
        
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--primary); box-shadow: 0 0 10px var(--primary);
            animation: scan 3s linear infinite; z-index: 9999; pointer-events: none;
        }
        
        @keyframes scan { 0% { transform: translateY(-100vh); } 100% { transform: translateY(100vh); } }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center; padding: 30px 0; border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
        }
        
        .header h1 { 
            font-size: 1.8rem; text-shadow: 0 0 20px var(--primary); margin-bottom: 10px;
        }
        
        .header .subtitle { color: var(--secondary); font-size: 0.85rem; letter-spacing: 2px; }
        
        .upload-section {
            background: rgba(0, 20, 0, 0.8); border: 2px dashed var(--warning);
            padding: 40px 20px; text-align: center; border-radius: 10px; margin-bottom: 30px;
            transition: all 0.3s; cursor: pointer;
        }        
        .upload-section:hover {
            background: rgba(0, 20, 0, 0.95); border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }
        
        .upload-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; }
        .upload-text { color: var(--secondary); margin-bottom: 10px; font-size: 1.1rem; }
        .upload-hint { font-size: 0.75rem; color: var(--info); }
        
        #fileInput { display: none; }
        
        .preview-section {
            text-align: center; margin-bottom: 30px; display: none;
        }
        
        #imagePreview {
            max-width: 100%; max-height: 350px; border: 2px solid var(--primary);
            border-radius: 5px;
        }
        
        .analyze-btn {
            width: 100%; padding: 18px; 
            background: var(--warning); color: var(--black);
            border: none; font-weight: bold; font-size: 1.1rem; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; 
            margin-bottom: 30px; transition: all 0.3s; border-radius: 5px;
        }
        
        .analyze-btn:hover:not(:disabled) {
            background: #ffcc00; box-shadow: 0 0 40px var(--warning);
            transform: translateY(-2px);
        }
        
        .analyze-btn:disabled { 
            opacity: 0.4; cursor: not-allowed; 
            background: #333; color: #666;
        }
        
        .results-container { display: none; }
        
        .result-card {
            background: rgba(0, 20, 0, 0.8); border: 1px solid var(--secondary);
            padding: 15px; margin-bottom: 15px; border-radius: 5px;
        }
        
        .result-card.critical {
            border-color: var(--alert); box-shadow: 0 0 15px rgba(255, 0, 64, 0.3);
        }
                .result-card h3 {
            color: var(--primary); margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid var(--secondary); font-size: 1.1rem;
        }
        
        .data-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px;
        }
        
        .data-item {
            background: rgba(0, 255, 65, 0.05); padding: 10px; border-radius: 3px;
            border-left: 3px solid var(--primary);
        }
        
        .data-label {
            color: var(--secondary); font-size: 0.7rem; margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .data-value {
            color: var(--primary); font-weight: bold; word-break: break-all;
            font-size: 0.9rem;
        }
        
        .data-value.warning { color: var(--warning); }
        .data-value.alert { color: var(--alert); }
        
        .gps-warning {
            background: rgba(255, 0, 64, 0.2); border: 2px solid var(--alert);
            padding: 15px; border-radius: 5px; margin: 15px 0; display: none;
        }
        
        .gps-warning h4 { color: var(--alert); margin-bottom: 8px; font-size: 1rem; }
        
        .terminal {
            background: rgba(0, 10, 0, 0.95); border: 1px solid var(--primary);
            padding: 12px; height: 180px; overflow-y: auto; font-size: 0.68rem;
            margin-bottom: 20px; border-radius: 5px;
        }
        
        .log-line { margin: 2px 0; }
        .log-line.success { color: var(--primary); }
        .log-line.error { color: var(--alert); }
        .log-line.warn { color: var(--warning); }
        .log-line.info { color: var(--secondary); }
        
        .progress-bar {
            width: 100%; height: 25px; background: rgba(0, 20, 0, 0.8);
            border: 1px solid var(--primary); border-radius: 5px;            margin-bottom: 20px; overflow: hidden;
        }
        
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--dark), var(--primary));
            width: 0%; transition: width 0.3s ease; display: flex;
            align-items: center; justify-content: center;
            color: var(--black); font-weight: bold; font-size: 0.8rem;
        }
        
        .status-msg {
            text-align: center; padding: 10px; margin: 10px 0;
            border-radius: 5px; display: none;
        }
        .status-msg.success { background: rgba(0,255,0,0.1); border: 1px solid var(--primary); color: var(--primary); }
        .status-msg.error { background: rgba(255,0,0,0.1); border: 1px solid var(--alert); color: var(--alert); }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.4rem; }
            .data-grid { grid-template-columns: 1fr; }
            .upload-section { padding: 25px 15px; }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔍 FORENSIC IMAGE ANALYZER</h1>
            <div class="subtitle">استخراج جميع البيانات من الصور</div>
        </div>
        
        <!-- Progress -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar">0% - جاهز</div>
        </div>
        
        <!-- Status Message -->
        <div class="status-msg" id="statusMsg"></div>
        
        <!-- Upload Section -->
        <div class="upload-section" onclick="document.getElementById('fileInput').click()">
            <span class="upload-icon">📁</span>
            <div class="upload-text"><strong>اضغط لاختيار صورة</strong></div>
            <div class="upload-hint">JPG • JPEG • PNG • TIFF</div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        </div>
                <!-- Preview -->
        <div class="preview-section" id="previewSection">
            <img id="imagePreview" alt="معاينة">
        </div>
        
        <!-- Analyze Button -->
        <button class="analyze-btn" id="analyzeBtn" onclick="analyzeImage()" disabled>
            🔍 بدء التحليل
        </button>
        
        <!-- Terminal -->
        <div class="terminal" id="console"></div>
        
        <!-- Results -->
        <div class="results-container" id="resultsContainer">
            
            <!-- GPS Warning -->
            <div class="gps-warning" id="gpsWarning">
                <h4>⚠️ تحذير: تم اكتشاف موقع جغرافي!</h4>
                <div id="gpsCoords" style="font-weight: bold; margin: 5px 0;"></div>
                <a id="mapLink" href="#" target="_blank" style="color: var(--primary); display: inline-block; margin-top: 5px;">
                    🗺️ عرض على خرائط جوجل
                </a>
            </div>
            
            <!-- Basic Info -->
            <div class="result-card">
                <h3>📄 معلومات الملف</h3>
                <div class="data-grid" id="basicInfo"></div>
            </div>
            
            <!-- Image Props -->
            <div class="result-card">
                <h3>🖼️ خصائص الصورة</h3>
                <div class="data-grid" id="imageProps"></div>
            </div>
            
            <!-- Camera Info -->
            <div class="result-card">
                <h3>📷 معلومات الكاميرا</h3>
                <div class="data-grid" id="cameraInfo"></div>
            </div>
            
            <!-- Exposure -->
            <div class="result-card">
                <h3>⚙️ إعدادات التصوير</h3>
                <div class="data-grid" id="exposureInfo"></div>
            </div>
            
            <!-- GPS -->            <div class="result-card critical" id="gpsSection" style="display: none;">
                <h3>📍 بيانات الموقع (GPS)</h3>
                <div class="data-grid" id="gpsInfo"></div>
            </div>
            
            <!-- Raw EXIF -->
            <div class="result-card">
                <h3>🔧 جميع بيانات EXIF</h3>
                <div class="data-grid" id="rawExif"></div>
            </div>
            
            <!-- Export -->
            <button class="analyze-btn" onclick="exportResults()" style="background: var(--info);">
                📥 تصدير كـ JSON
            </button>
        </div>
    </div>

    <script>
        // Global variables
        let selectedFile = null;
        let imageData = {};
        let exifData = {};
        
        // Logging with console output
        function log(msg, type = 'info') {
            const consoleEl = document.getElementById('console');
            if (consoleEl) {
                const line = document.createElement('div');
                line.className = `log-line ${type}`;
                line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
                consoleEl.appendChild(line);
                consoleEl.scrollTop = consoleEl.scrollHeight;
            }
            // Also output to browser console for debugging
            if (type === 'error') console.error(msg);
            else if (type === 'warn') console.warn(msg);
            else console.log(msg);
        }
        
        // Show status message
        function showStatus(msg, type) {
            const statusEl = document.getElementById('statusMsg');
            statusEl.className = `status-msg ${type}`;
            statusEl.innerText = msg;
            statusEl.style.display = 'block';
            setTimeout(() => { statusEl.style.display = 'none'; }, 5000);
        }
        
        // Update progress        function updateProgress(percent, message) {
            const bar = document.getElementById('progressBar');
            bar.style.width = percent + '%';
            bar.innerText = `${percent}% - ${message}`;
        }
        
        // Format file size
        function formatFileSize(bytes) {
            if (!bytes && bytes !== 0) return 'غير معروف';
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // Format EXIF date
        function formatExifDate(dateStr) {
            if (!dateStr) return 'غير متوفر';
            const parts = dateStr.split(' ');
            const dateParts = parts[0]?.split(':') || [];
            const timeParts = parts[1]?.split(':') || [];
            if (dateParts.length === 3) {
                return `${dateParts[2]}/${dateParts[1]}/${dateParts[0]} ${timeParts.join(':') || '00:00:00'}`;
            }
            return dateStr;
        }
        
        // Convert GPS coordinates
        function convertGPS(degrees, minutes, seconds, ref) {
            let decimal = parseFloat(degrees) + parseFloat(minutes) / 60 + parseFloat(seconds) / 3600;
            if (ref === 'S' || ref === 'W') decimal = -decimal;
            return decimal.toFixed(6);
        }
        
        // Get readable EXIF value
        function getReadable(tag, value) {
            const maps = {
                'ExposureProgram': {0:'غير محدد',1:'يدوي',2:'تلقائي',3:'أولوية فتحة',4:'أولوية غالق',5:'برنامج',6:'هيدلايت',7:'بورتريه',8:'طبيعة'},
                'MeteringMode': {0:'غير معروف',1:'متوسط',2:'مركزي',3:'نقطة',4:'متعدد'},
                'Flash': {0:'لم يومض',1:'يومض',16:'لا يوجد فلاش'},
                'WhiteBalance': {0:'تلقائي',1:'يدوي'},
                'Contrast': {0:'عادي',1:'منخفض',2:'عالي'},
                'Saturation': {0:'عادي',1:'منخفض',2:'عالي'},
                'Sharpness': {0:'عادي',1:'منخفض',2:'عالي'}
            };
            return maps[tag]?.[value] ?? value;
        }
        
        // Handle file selection - FIXED        function handleFileSelect(event) {
            log('=== اختيار ملف ===', 'info');
            
            const file = event.target.files?.[0];
            if (!file) {
                log('✗ لم يتم اختيار ملف', 'error');
                return;
            }
            
            log(`📁 الملف: ${file.name}`, 'info');
            log(`📄 النوع: ${file.type}`, 'info');
            log(`💾 الحجم: ${formatFileSize(file.size)}`, 'info');
            
            // Validate image type
            if (!file.type || !file.type.startsWith('image/')) {
                log('✗ الملف ليس صورة صالحة', 'error');
                showStatus('الرجاء اختيار ملف صورة صالح', 'error');
                return;
            }
            
            selectedFile = file;
            log('✓ تم اختيار الملف بنجاح', 'success');
            
            // Show preview
            const preview = document.getElementById('imagePreview');
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    preview.src = e.target.result;
                    document.getElementById('previewSection').style.display = 'block';
                    document.getElementById('analyzeBtn').disabled = false;
                    updateProgress(25, 'الصورة جاهزة');
                    log('✓ تم عرض المعاينة', 'success');
                } catch (err) {
                    log('✗ فشل عرض المعاينة: ' + err.message, 'error');
                }
            };
            
            reader.onerror = function(err) {
                log('✗ فشل قراءة الملف: ' + (err.target?.error?.message || 'خطأ غير معروف'), 'error');
                showStatus('فشل قراءة الملف', 'error');
            };
            
            reader.readAsDataURL(file);
            log('🔄 جاري قراءة الملف...', 'info');
        }
        
        // Main analysis function - FIXED & SIMPLIFIED
        async function analyzeImage() {            log('=== بدء التحليل ===', 'system');
            
            if (!selectedFile) {
                log('✗ لا يوجد صورة مختارة', 'error');
                showStatus('اختر صورة أولاً', 'error');
                return;
            }
            
            // Disable button during analysis
            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.innerText = 'جاري التحليل...';
            
            updateProgress(30, 'جاري القراءة...');
            
            try {
                // Reset results
                document.getElementById('resultsContainer').style.display = 'none';
                document.getElementById('gpsWarning').style.display = 'none';
                document.getElementById('gpsSection').style.display = 'none';
                imageData = {};
                exifData = {};
                
                // Basic file info
                imageData.basic = {
                    '📁 الاسم': selectedFile.name,
                    '📄 النوع': selectedFile.type || 'غير معروف',
                    '💾 الحجم': formatFileSize(selectedFile.size),
                    '🔢 البايت': selectedFile.size.toLocaleString() + ' بايت'
                };
                
                // Load image for dimensions
                log('🔄 جاري تحميل الصورة...', 'info');
                updateProgress(40, 'جاري التحميل...');
                
                const img = new Image();
                const dataUrl = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(selectedFile);
                });
                
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = () => reject(new Error('فشل تحميل الصورة'));
                    img.src = dataUrl;
                });
                
                log(`✓ تم تحميل الصورة: ${img.width}x${img.height}`, 'success');                
                // Image properties
                imageData.properties = {
                    '📐 العرض': img.width + ' بكسل',
                    '📐 الارتفاع': img.height + ' بكسل',
                    '🔲 النسبة': (img.width / img.height).toFixed(2) + ':1',
                    '🖼️ التنسيق': (selectedFile.type.split('/')[1] || 'غير معروف').toUpperCase()
                };
                
                // Extract EXIF - with fallback
                log('🔍 جاري استخراج بيانات EXIF...', 'info');
                updateProgress(60, 'جاري استخراج البيانات...');
                
                if (typeof EXIF !== 'undefined' && typeof EXIF.getData === 'function') {
                    log('✓ مكتبة EXIF متاحة', 'success');
                    
                    // Wait for EXIF to load
                    await new Promise(resolve => {
                        EXIF.getData(img, function() {
                            try {
                                exifData = EXIF.getAllTags(this) || {};
                                log(`✓ تم استخراج ${Object.keys(exifData).length} حقل`, 'success');
                                resolve();
                            } catch (e) {
                                log('✗ فشل استخراج EXIF: ' + e.message, 'error');
                                resolve(); // Continue anyway
                            }
                        });
                    });
                } else {
                    log('⚠️ مكتبة EXIF غير متاحة - سيتم التحليل بدونها', 'warn');
                }
                
                // Process EXIF data
                processExifData();
                
                // Display results
                updateProgress(90, 'جاري العرض...');
                displayResults();
                
                updateProgress(100, '✅ اكتمل');
                log('=== اكتمل التحليل ===', 'success');
                
                document.getElementById('resultsContainer').style.display = 'block';
                showStatus('✅ اكتمل التحليل بنجاح', 'success');
                
            } catch (error) {
                log('✗ فشل التحليل: ' + error.message, 'error');
                log('💡 تأكد أن الملف صورة صالحة وغير تالفة', 'warn');
                updateProgress(0, '❌ فشل');                showStatus('فشل التحليل: ' + error.message, 'error');
            } finally {
                // Re-enable button
                btn.disabled = false;
                btn.innerText = '🔍 بدء التحليل';
            }
        }
        
        // Process EXIF into categories
        function processExifData() {
            if (Object.keys(exifData).length === 0) return;
            
            // Camera
            if (exifData.Make || exifData.Model) {
                imageData.camera = {};
                if (exifData.Make) imageData.camera['🏭 المصنع'] = exifData.Make;
                if (exifData.Model) imageData.camera['📱 الموديل'] = exifData.Model;
                if (exifData.LensModel) imageData.camera['🔭 العدسة'] = exifData.LensModel;
            }
            
            // Exposure
            imageData.exposure = {};
            if (exifData.ISOSpeedRatings) imageData.exposure['🔆 ISO'] = exifData.ISOSpeedRatings;
            if (exifData.FNumber) imageData.exposure['🔍 فتحة'] = 'f/' + exifData.FNumber;
            if (exifData.ExposureTime) imageData.exposure['⏱️ غالق'] = exifData.ExposureTime + 'ث';
            if (exifData.FocalLength) imageData.exposure['🔭 بعد بؤري'] = exifData.FocalLength + 'مم';
            if (exifData.Flash !== undefined) imageData.exposure['💡 فلاش'] = getReadable('Flash', exifData.Flash);
            if (exifData.WhiteBalance !== undefined) imageData.exposure['⚖️ توازن أبيض'] = getReadable('WhiteBalance', exifData.WhiteBalance);
            
            // Date/Time
            if (exifData.DateTimeOriginal || exifData.DateTime) {
                imageData.dateTime = {};
                if (exifData.DateTimeOriginal) imageData.dateTime['📅 التصوير'] = formatExifDate(exifData.DateTimeOriginal);
                if (exifData.DateTime) imageData.dateTime['📅 التعديل'] = formatExifDate(exifData.DateTime);
            }
            
            // GPS - MOST IMPORTANT
            if (exifData.GPSLatitude && exifData.GPSLongitude && 
                Array.isArray(exifData.GPSLatitude) && Array.isArray(exifData.GPSLongitude)) {
                try {
                    const lat = convertGPS(
                        exifData.GPSLatitude[0], exifData.GPSLatitude[1], exifData.GPSLatitude[2],
                        exifData.GPSLatitudeRef || 'N'
                    );
                    const lng = convertGPS(
                        exifData.GPSLongitude[0], exifData.GPSLongitude[1], exifData.GPSLongitude[2],
                        exifData.GPSLongitudeRef || 'E'
                    );
                    
                    imageData.gps = {                        '📍 العرض': lat,
                        '📍 الطول': lng,
                        '🧭 مرجع العرض': exifData.GPSLatitudeRef || 'N',
                        '🧭 مرجع الطول': exifData.GPSLongitudeRef || 'E'
                    };
                    
                    if (exifData.GPSAltitude) {
                        imageData.gps['🏔️ الارتفاع'] = parseFloat(exifData.GPSAltitude).toFixed(1) + 'م';
                    }
                    
                    // Show GPS warning
                    document.getElementById('gpsWarning').style.display = 'block';
                    document.getElementById('gpsSection').style.display = 'block';
                    document.getElementById('gpsCoords').innerHTML = 
                        `LAT: <span class="data-value alert">${lat}</span><br>LNG: <span class="data-value alert">${lng}</span>`;
                    document.getElementById('mapLink').href = `https://maps.google.com/?q=${lat},${lng}`;
                    
                    log(`⚠️ GPS مكتشف: ${lat}, ${lng}`, 'warn');
                    
                } catch (e) {
                    log('✗ فشل معالجة GPS: ' + e.message, 'error');
                }
            }
            
            // Software
            if (exifData.Software || exifData.Artist) {
                imageData.software = {};
                if (exifData.Software) imageData.software['💻 البرنامج'] = exifData.Software;
                if (exifData.Artist) imageData.software['👤 المالك'] = exifData.Artist;
            }
            
            // Raw EXIF (limited to avoid overflow)
            imageData.rawExif = {};
            let count = 0;
            for (const [key, value] of Object.entries(exifData)) {
                if (count >= 20) break; // Limit display
                if (['GPSLatitude','GPSLongitude','GPSLatitudeRef','GPSLongitudeRef'].includes(key)) continue;
                imageData.rawExif[`🔧 ${key}`] = typeof value === 'object' ? JSON.stringify(value).slice(0, 50) : String(value);
                count++;
            }
        }
        
        // Display results
        function displayResults() {
            function populate(gridId, data) {
                const grid = document.getElementById(gridId);
                if (!grid) return;
                grid.innerHTML = '';
                
                if (!data || Object.keys(data).length === 0) {                    grid.innerHTML = '<div class="data-item"><div class="data-value warning">لا توجد بيانات</div></div>';
                    return;
                }
                
                for (const [label, value] of Object.entries(data)) {
                    const item = document.createElement('div');
                    item.className = 'data-item';
                    const valClass = label.includes('GPS') || label.includes('العرض') || label.includes('الطول') ? 'alert' : '';
                    item.innerHTML = `<div class="data-label">${label}</div><div class="data-value ${valClass}">${value}</div>`;
                    grid.appendChild(item);
                }
            }
            
            populate('basicInfo', imageData.basic);
            populate('imageProps', imageData.properties);
            populate('cameraInfo', imageData.camera);
            populate('exposureInfo', imageData.exposure);
            populate('gpsInfo', imageData.gps);
            populate('rawExif', imageData.rawExif);
        }
        
        // Export results
        function exportResults() {
            const exportData = {
                timestamp: new Date().toISOString(),
                file: { name: selectedFile?.name, type: selectedFile?.type, size: selectedFile?.size },
                data: { ...imageData, exif: exifData }
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            log('✓ تم التصدير', 'success');
        }
        
        // Initialize
        window.onload = function() {
            log('✅ المحلل الجنائي للصور - جاهز', 'system');
            updateProgress(0, 'جاهز - اختر صورة');
            
            // Check if EXIF library loaded
            if (typeof EXIF === 'undefined') {
                log('⚠️ مكتبة EXIF لم تُحمّل - سيتم التحليل الأساسي فقط', 'warn');
            } else {
                log('✓ مكتبة EXIF جاهزة', 'success');
            }        };
        
        // Debug: Log EXIF library status
        console.log('EXIF library:', typeof EXIF !== 'undefined' ? 'loaded' : 'NOT loaded');
    </script>
</body>
</html>
